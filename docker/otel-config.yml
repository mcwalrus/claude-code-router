# ── OpenTelemetry Collector config for CCR ──────────────────────────────────
# Minimal config: accepts OTLP traces/metrics, logs them to stdout.
# No external backend required — useful for local validation.
#
# Ports (when running via docker compose):
#   4317 — OTLP gRPC receiver
#   4318 — OTLP HTTP receiver
#
# Usage:
#   docker compose --profile otel up -d otel-collector
# ────────────────────────────────────────────────────────────────────────────

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
